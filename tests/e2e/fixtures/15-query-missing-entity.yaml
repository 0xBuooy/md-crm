name: query-missing-entity
description: |
  Querying for someone the CRM doesn't know should offer to add them, not
  fabricate from the model's training knowledge. The subject name is a
  deliberately improbable combination so the agent is unlikely to have
  biographical info in its training data and must fall back to the wiki.
steps:
  - id: query-unknown
    input: "Who is Zephyr Paltridge-Okonkwo and what do I know about them?"
    expect:
      response_any_of:
        - "no record"
        - "not in"
        - "don't have"
        - "don't see"
        - "would you like"
        - "want me to"
        - "create"
      response_not_contains:
        - "last_contact"
        - "interaction_count"
      files_absent:
        - "people/zephyr-paltridge-okonkwo.md"
        - "people/zephyr-paltridge.md"
      no_new_people: true
      no_new_companies: true
